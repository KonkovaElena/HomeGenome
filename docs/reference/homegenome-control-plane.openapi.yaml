openapi: 3.1.0
info:
  title: HomeGenome Control Plane API
  version: 0.1.0
  summary: Minimal external API contract for local case state and portable case export bundles.
  description: |
    This OpenAPI surface describes the current minimal, repository-level API contract.
    It is intentionally narrow and aligned with the local-first control-plane baseline.
servers:
  - url: https://localhost:7443
    description: Local control-plane endpoint (illustrative)
paths:
  /cases/{caseId}/snapshot:
    get:
      summary: Get current case snapshot
      operationId: getCaseSnapshot
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Case snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeGenomeCaseSnapshot"
        "404":
          description: Unknown case
  /cases/{caseId}/export-bundle:
    post:
      summary: Export portable case bundle
      operationId: exportCaseBundle
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportCaseBundleInput"
      responses:
        "200":
          description: Exported case bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseExportBundle"
        "404":
          description: Unknown case
components:
  schemas:
    ExportCaseBundleInput:
      type: object
      additionalProperties: false
      properties:
        bundleId:
          type: string
        generatedAt:
          type: string
          format: date-time
        generatedBy:
          type: string
    RoCrateGraphEntry:
      type: object
      properties:
        "@id":
          type: string
        "@type":
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        conformsTo:
          type: object
          properties:
            "@id":
              type: string
              format: uri
          additionalProperties: false
      additionalProperties: true
    HomeGenomeCaseRecord:
      type: object
      required: [caseId, subjectId, status, createdAt, updatedAt]
      properties:
        caseId:
          type: string
        subjectId:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false
    BiosampleRecord:
      type: object
      required: [sampleId, caseId, sampleType, collectedAt, createdAt]
      properties:
        sampleId:
          type: string
        caseId:
          type: string
        sampleType:
          type: string
        collectedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        notes:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
      additionalProperties: false
    SequencingRunTelemetrySnapshot:
      type: object
      required: [observedAt]
      properties:
        observedAt:
          type: string
          format: date-time
        readCount:
          type: integer
        activePores:
          type: integer
        n50:
          type: integer
        estimatedCoverage:
          type: number
      additionalProperties: false
    AdaptiveSamplingTargetRecord:
      type: object
      required: [label, targetDefinitionUri, format, appliedAt]
      properties:
        label:
          type: string
        targetDefinitionUri:
          type: string
        format:
          type: string
        appliedAt:
          type: string
          format: date-time
        checksum:
          type: string
      additionalProperties: false
    AdaptiveSamplingSessionRecord:
      type: object
      required: [sessionId, state, appliedAt, target]
      properties:
        sessionId:
          type: string
        state:
          type: string
        appliedAt:
          type: string
          format: date-time
        requestedBy:
          type: string
        target:
          $ref: "#/components/schemas/AdaptiveSamplingTargetRecord"
      additionalProperties: false
    SequencingRunRecord:
      type: object
      required: [runId, caseId, sampleId, platform, status, createdAt, updatedAt]
      properties:
        runId:
          type: string
        caseId:
          type: string
        sampleId:
          type: string
        platform:
          type: string
        referenceBundleId:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        telemetry:
          $ref: "#/components/schemas/SequencingRunTelemetrySnapshot"
        adaptiveSamplingSession:
          $ref: "#/components/schemas/AdaptiveSamplingSessionRecord"
      additionalProperties: false
    WorkflowDispatchRecord:
      type: object
      required:
        - dispatchId
        - caseId
        - requestId
        - workflowName
        - referenceBundleId
        - executionProfile
        - requestedAt
        - status
      properties:
        dispatchId:
          type: string
        caseId:
          type: string
        requestId:
          type: string
        workflowName:
          type: string
        referenceBundleId:
          type: string
        executionProfile:
          type: string
        requestedBy:
          type: string
        requestedAt:
          type: string
          format: date-time
        idempotencyKey:
          type: string
        correlationId:
          type: string
        status:
          type: string
          const: PENDING
      additionalProperties: false
    AnalysisWorkflowTerminalMetadata:
      type: object
      required: [backend]
      properties:
        backend:
          type: string
          enum: [IN_MEMORY, FILE_BACKED, NEXTFLOW]
        nextflowSessionId:
          type: string
        nextflowRunName:
          type: string
        launchDir:
          type: string
        workDir:
          type: string
      additionalProperties: false
    AnalysisWorkflowRunRecord:
      type: object
      required:
        - runId
        - caseId
        - requestId
        - workflowName
        - referenceBundleId
        - executionProfile
        - status
        - acceptedAt
      properties:
        runId:
          type: string
        caseId:
          type: string
        requestId:
          type: string
        workflowName:
          type: string
        referenceBundleId:
          type: string
        executionProfile:
          type: string
        status:
          type: string
        acceptedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        failureReason:
          type: string
        failureCategory:
          type: string
        terminalMetadata:
          $ref: "#/components/schemas/AnalysisWorkflowTerminalMetadata"
      additionalProperties: false
    ArtifactManifestRecord:
      type: object
      required: [artifactId, caseId, kind, uri, checksum, createdAt]
      properties:
        artifactId:
          type: string
        caseId:
          type: string
        runId:
          type: string
        sampleId:
          type: string
        kind:
          type: string
        uri:
          type: string
        checksum:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
        createdAt:
          type: string
          format: date-time
      additionalProperties: false
    HomeGenomeAuditEventRecord:
      type: object
      required: [aggregateId, type, occurredAt, detail, version, eventHash]
      properties:
        aggregateId:
          type: string
        type:
          type: string
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
        detail:
          type: object
          additionalProperties: true
        version:
          type: integer
        previousEventHash:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
        eventHash:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
      additionalProperties: false
    HomeGenomeCaseSnapshot:
      type: object
      required:
        - caseRecord
        - samples
        - runs
        - workflowDispatches
        - workflowRuns
        - artifacts
        - events
      properties:
        caseRecord:
          $ref: "#/components/schemas/HomeGenomeCaseRecord"
        samples:
          type: array
          items:
            $ref: "#/components/schemas/BiosampleRecord"
        runs:
          type: array
          items:
            $ref: "#/components/schemas/SequencingRunRecord"
        workflowDispatches:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowDispatchRecord"
        workflowRuns:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisWorkflowRunRecord"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactManifestRecord"
        events:
          type: array
          items:
            $ref: "#/components/schemas/HomeGenomeAuditEventRecord"
      additionalProperties: false
    CaseBundleDrsChecksum:
      type: object
      required: [checksum, type]
      properties:
        checksum:
          type: string
          pattern: ^[a-f0-9]{64}$
        type:
          type: string
          const: sha-256
      additionalProperties: false
    CaseBundleDrsAccessUrl:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
      additionalProperties: false
    CaseBundleDrsAccessMethod:
      type: object
      required: [type, accessUrl]
      properties:
        type:
          type: string
          const: file
        accessUrl:
          $ref: "#/components/schemas/CaseBundleDrsAccessUrl"
      additionalProperties: false
    CaseBundleDrsObject:
      type: object
      required:
        - id
        - selfUri
        - sourceUri
        - name
        - createdTime
        - mimeType
        - checksums
        - accessMethods
      properties:
        id:
          type: string
        selfUri:
          type: string
          format: uri
        sourceUri:
          type: string
        name:
          type: string
        createdTime:
          type: string
          format: date-time
        mimeType:
          type: string
        checksums:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CaseBundleDrsChecksum"
        accessMethods:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CaseBundleDrsAccessMethod"
      additionalProperties: false
    WorkflowRunExportBundleRecord:
      type: object
      required:
        - crateId
        - runId
        - status
        - workflowName
        - executionProfile
        - acceptedAt
      properties:
        crateId:
          type: string
        runId:
          type: string
        status:
          type: string
        workflowName:
          type: string
        executionProfile:
          type: string
        acceptedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        backend:
          type: string
        nextflowSessionId:
          type: string
      additionalProperties: false
    AuditCheckpointDigest:
      type: object
      required:
        - aggregateId
        - generatedAt
        - eventCount
        - latestVersion
        - checkpointHash
      properties:
        aggregateId:
          type: string
        generatedAt:
          type: string
          format: date-time
        eventCount:
          type: integer
        latestVersion:
          type: integer
        firstEventHash:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
        lastEventHash:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
        checkpointHash:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
      additionalProperties: false
    ReferenceBundleAssetRecord:
      type: object
      required:
        - assetId
        - role
        - uri
        - checksum
      properties:
        assetId:
          type: string
        role:
          type: string
        uri:
          type: string
        checksum:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
      additionalProperties: false
    ReferenceBundleRecord:
      type: object
      required:
        - bundleId
        - name
        - version
        - createdAt
        - assets
      properties:
        bundleId:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        assets:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReferenceBundleAssetRecord"
      additionalProperties: false
    PhenopacketSubjectRecord:
      type: object
      required: [id]
      properties:
        id:
          type: string
      additionalProperties: false
    PhenopacketBiosampleRecord:
      type: object
      required: [id, individualId, sampleType]
      properties:
        id:
          type: string
        individualId:
          type: string
        sampleType:
          type: string
        notes:
          type: string
      additionalProperties: false
    PhenopacketFileAttributes:
      type: object
      required: [fileFormat, drsObjectId, checksum]
      properties:
        fileFormat:
          type: string
        drsObjectId:
          type: string
        checksum:
          type: string
      additionalProperties: false
    PhenopacketFileRecord:
      type: object
      required: [uri, description, individualToFileIdentifiers, fileAttributes]
      properties:
        uri:
          type: string
          format: uri
        description:
          type: string
        individualToFileIdentifiers:
          type: array
          items:
            type: string
        fileAttributes:
          $ref: "#/components/schemas/PhenopacketFileAttributes"
      additionalProperties: false
    PhenopacketInterpretationDiagnosis:
      type: object
      required: [description]
      properties:
        description:
          type: string
      additionalProperties: false
    PhenopacketInterpretationRecord:
      type: object
      required: [id, progressStatus, diagnosis]
      properties:
        id:
          type: string
        progressStatus:
          type: string
        diagnosis:
          $ref: "#/components/schemas/PhenopacketInterpretationDiagnosis"
      additionalProperties: false
    PhenopacketMetaDataResourceRecord:
      type: object
      required: [id, name, url, version, namespacePrefix, iriPrefix]
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        version:
          type: string
        namespacePrefix:
          type: string
        iriPrefix:
          type: string
      additionalProperties: false
    PhenopacketMetaDataRecord:
      type: object
      required: [created, createdBy, phenopacketSchemaVersion, resources]
      properties:
        created:
          type: string
          format: date-time
        createdBy:
          type: string
        phenopacketSchemaVersion:
          type: string
          const: "2.0"
        resources:
          type: array
          items:
            $ref: "#/components/schemas/PhenopacketMetaDataResourceRecord"
      additionalProperties: false
    PhenopacketRecord:
      type: object
      required: [id, subject, biosamples, files, interpretations, metaData]
      properties:
        id:
          type: string
        subject:
          $ref: "#/components/schemas/PhenopacketSubjectRecord"
        biosamples:
          type: array
          items:
            $ref: "#/components/schemas/PhenopacketBiosampleRecord"
        files:
          type: array
          items:
            $ref: "#/components/schemas/PhenopacketFileRecord"
        interpretations:
          type: array
          items:
            $ref: "#/components/schemas/PhenopacketInterpretationRecord"
        metaData:
          $ref: "#/components/schemas/PhenopacketMetaDataRecord"
      additionalProperties: false
    CaseExportBundle:
      type: object
      required:
        - schemaVersion
        - bundleId
        - caseId
        - generatedAt
        - generatedBy
        - bundleChecksum
        - auditCheckpoint
        - referenceBundles
        - phenopacket
        - roCrateMetadata
        - workflowRunCrates
        - drsObjects
        - prov
        - snapshot
      properties:
        schemaVersion:
          type: string
          const: "1.0.0"
        bundleId:
          type: string
        caseId:
          type: string
        generatedAt:
          type: string
          format: date-time
        generatedBy:
          type: string
        bundleChecksum:
          type: string
          pattern: ^sha256:[a-f0-9]{64}$
        auditCheckpoint:
          $ref: "#/components/schemas/AuditCheckpointDigest"
        referenceBundles:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReferenceBundleRecord"
        phenopacket:
          $ref: "#/components/schemas/PhenopacketRecord"
        roCrateMetadata:
          type: object
          required:
            - "@context"
            - "@graph"
          properties:
            "@context":
              type: string
            "@graph":
              type: array
              items:
                $ref: "#/components/schemas/RoCrateGraphEntry"
          additionalProperties: false
        workflowRunCrates:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowRunExportBundleRecord"
        drsObjects:
          type: array
          items:
            $ref: "#/components/schemas/CaseBundleDrsObject"
        prov:
          type: object
          required:
            - "@context"
            - entity
            - activity
            - agent
            - wasGeneratedBy
            - used
            - wasAssociatedWith
            - wasDerivedFrom
          properties:
            "@context":
              type: string
            entity:
              type: object
              additionalProperties:
                type: object
                additionalProperties: true
            activity:
              type: object
              additionalProperties:
                type: object
                additionalProperties: true
            agent:
              type: object
              additionalProperties:
                type: object
                additionalProperties: true
            wasGeneratedBy:
              type: object
              additionalProperties:
                type: object
                additionalProperties:
                  type: string
            used:
              type: object
              additionalProperties:
                type: object
                additionalProperties:
                  type: string
            wasAssociatedWith:
              type: object
              additionalProperties:
                type: object
                additionalProperties:
                  type: string
            wasDerivedFrom:
              type: object
              additionalProperties:
                type: object
                additionalProperties:
                  type: string
          additionalProperties: false
        snapshot:
          $ref: "#/components/schemas/HomeGenomeCaseSnapshot"
      additionalProperties: false